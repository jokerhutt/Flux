# cft.cfg -- C-to-Flux translator configuration
# Place this file next to cft.py or in the working directory.

[cft]
# Path to libclang shared library.
# Windows example: D:\LLVM\bin\libclang.dll
# Linux example:   /usr/lib/llvm-18/lib/libclang-18.so.1
libclang = /usr/lib/llvm-18/lib/libclang-18.so.1

[cstdlib]
# Root directory where translated .fx headers are written.
# When a translated source includes <sys/types.h> and the file lives under
# one of the include_roots below, cft emits:
#   <output_root>/sys/types.fx
# Leave empty to disable include walking.
output_root = /mnt/d/cstdlib

# Semicolon-separated list of C system include root directories.
# cft uses these to compute the relative path of each included header
# when deciding where to write the translated .fx file.
# Example (Linux):
#   include_roots = /usr/include;/usr/local/include
# Example (Windows/MSVC):
#   include_roots = C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Tools\MSVC\14.38.33130\include
include_roots = /mnt/d/cstdlib

[clang]
# Space-separated extra flags forwarded to libclang when parsing.
# Defaults to: -x c -std=c11
# Will incrememntally approach C23 (or whatever it is when we get there)
args = -x c -std=c11